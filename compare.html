<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Answers — GimmI Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="nav"><a href="index.html">← Back to home</a></nav>

    <h1 class="page-title">Compare Answers</h1>
    <p class="page-subtitle">Read both responses and click the one you prefer.</p>

    <div class="question-display" id="question-display">Loading question...</div>

    <div class="comparison" id="comparison">
      <div class="answer-card">
        <h3 id="label-a">Answer A</h3>
        <p id="answer-a">Loading...</p>
        <button class="btn" id="btn-a">I prefer this answer</button>
      </div>

      <div class="answer-card">
        <h3 id="label-b">Answer B</h3>
        <p id="answer-b">Loading...</p>
        <button class="btn" id="btn-b">I prefer this answer</button>
      </div>
    </div>

    <p id="status" style="margin-top: 1.5rem; display: none;"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://hqbgbqhajargsgvyryrk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxYmdicWhhamFyZ3NndnlyeXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAxMzQsImV4cCI6MjEwMDIxNjEzNH0.7F42Rtp2OiEEZKBN2XJXJhCOCX9WmIUlUVBxv9qkT5s';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const voterId = localStorage.getItem('voter_id');
    if (!voterId) {
      window.location.href = 'index.html';
    }

    let currentMatch = null;

    function shuffleArray(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getBracketKey(externalQid) {
      return 'bracket_' + voterId + '_' + externalQid;
    }

    function getBracketOrder(externalQid, labels) {
      const key = getBracketKey(externalQid);
      const stored = localStorage.getItem(key);
      if (stored) {
        return JSON.parse(stored);
      }
      const shuffled = shuffleArray(labels);
      localStorage.setItem(key, JSON.stringify(shuffled));
      return shuffled;
    }

    function buildBracketMatches(order) {
      const n = order.length;
      const matches = [];
      if (n === 2) {
        matches.push({ round: 1, match: 1, a: order[0], b: order[1] });
      } else if (n === 3) {
        matches.push({ round: 1, match: 1, a: order[0], b: order[1] });
        matches.push({ round: 2, match: 1, a: 'winner_r1m1', b: order[2] });
      } else if (n === 4) {
        matches.push({ round: 1, match: 1, a: order[0], b: order[1] });
        matches.push({ round: 1, match: 2, a: order[2], b: order[3] });
        matches.push({ round: 2, match: 1, a: 'winner_r1m1', b: 'winner_r1m2' });
        matches.push({ round: 3, match: 1, a: 'loser_r1m1', b: 'loser_r1m2' });
      }
      return matches;
    }

    function resolveSlot(slot, matchResults) {
      if (!slot.startsWith('winner_') && !slot.startsWith('loser_')) {
        return slot;
      }
      const parts = slot.split('_');
      const result = parts[0]; // winner or loser
      const round = parseInt(parts[1].replace('r', ''));
      const match = parseInt(parts[2].replace('m', ''));
      const key = round + '_' + match;
      const mr = matchResults[key];
      if (!mr) return null;
      return result === 'winner' ? mr.winner : mr.loser;
    }

    function getAllPairs(labels) {
      const pairs = [];
      for (let i = 0; i < labels.length; i++) {
        for (let j = i + 1; j < labels.length; j++) {
          pairs.push([labels[i], labels[j]]);
        }
      }
      return pairs;
    }

    async function loadNextPair() {
      const status = document.getElementById('status');
      const questionEl = document.getElementById('question-display');
      const comparisonEl = document.getElementById('comparison');

      questionEl.style.display = 'block';
      comparisonEl.style.display = 'flex';
      status.style.display = 'none';

      const [
        { data: questions, error: qError },
        { data: allAnswers, error: aError },
        { data: allVotes, error: vError }
      ] = await Promise.all([
        supabase.from('questions').select('*'),
        supabase.from('answers').select('*'),
        supabase.from('preference_votes').select('*').eq('voter_id', voterId)
      ]);

      if (qError || aError || vError) {
        console.error(qError, aError, vError);
        status.textContent = 'Error loading data. Please refresh.';
        status.style.color = '#c62828';
        status.style.display = 'block';
        return;
      }

      if (!questions || questions.length === 0) {
        questionEl.style.display = 'none';
        comparisonEl.style.display = 'none';
        status.textContent = 'No questions available yet. Check back later!';
        status.style.color = 'var(--muted-color)';
        status.style.display = 'block';
        return;
      }

      const answersByQid = {};
      (allAnswers || []).forEach(a => {
        if (!answersByQid[a.external_qid]) answersByQid[a.external_qid] = [];
        answersByQid[a.external_qid].push(a);
      });

      const votesByQid = {};
      (allVotes || []).forEach(v => {
        if (!votesByQid[v.external_qid]) votesByQid[v.external_qid] = [];
        votesByQid[v.external_qid].push(v);
      });

      for (const question of questions) {
        const answers = answersByQid[question.external_qid];
        if (!answers || answers.length < 2) continue;

        const labels = answers.map(a => a.label);
        const n = labels.length;
        const votes = votesByQid[question.external_qid] || [];

        if (n <= 4) {
          // Bracket mode
          const order = getBracketOrder(question.external_qid, labels);
          const bracketMatches = buildBracketMatches(order);

          // Build match results from existing votes
          const matchResults = {};
          votes.forEach(v => {
            const key = v.round_number + '_' + v.match_in_round;
            matchResults[key] = {
              winner: v.winner_label,
              loser: v.winner_label === v.answer_a_label ? v.answer_b_label : v.answer_a_label
            };
          });

          // Find the first unresolved match
          let nextMatch = null;
          for (const m of bracketMatches) {
            const key = m.round + '_' + m.match;
            if (matchResults[key]) continue;

            const aLabel = resolveSlot(m.a, matchResults);
            const bLabel = resolveSlot(m.b, matchResults);

            if (aLabel && bLabel) {
              nextMatch = {
                question: question,
                round: m.round,
                match: m.match,
                aLabel: aLabel,
                bLabel: bLabel
              };
              break;
            }
          }

          if (nextMatch) {
            const ansA = answers.find(a => a.label === nextMatch.aLabel);
            const ansB = answers.find(a => a.label === nextMatch.bLabel);

            currentMatch = {
              question: question,
              round: nextMatch.round,
              match: nextMatch.match,
              optionA: ansA,
              optionB: ansB
            };

            questionEl.textContent = '"' + question.question_text + '"';
            document.getElementById('label-a').textContent = 'Answer ' + ansA.label;
            document.getElementById('answer-a').textContent = ansA.answer_text;
            document.getElementById('label-b').textContent = 'Answer ' + ansB.label;
            document.getElementById('answer-b').textContent = ansB.answer_text;
            document.getElementById('btn-a').onclick = () => castVote(ansA.label);
            document.getElementById('btn-b').onclick = () => castVote(ansB.label);

            return;
          }
        } else {
          // Round-robin fallback for 5 answers
          const allPairs = getAllPairs(labels);
          const votedSet = new Set();
          votes.forEach(v => {
            const key = [v.answer_a_label, v.answer_b_label].sort().join('-');
            votedSet.add(key);
          });

          const remainingPairs = allPairs.filter(pair => {
            const key = pair.slice().sort().join('-');
            return !votedSet.has(key);
          });

          if (remainingPairs.length > 0) {
            const pair = remainingPairs[Math.floor(Math.random() * remainingPairs.length)];
            if (Math.random() > 0.5) pair.reverse();

            const ansA = answers.find(a => a.label === pair[0]);
            const ansB = answers.find(a => a.label === pair[1]);

            currentMatch = {
              question: question,
              round: 0,
              match: 0,
              optionA: ansA,
              optionB: ansB
            };

            questionEl.textContent = '"' + question.question_text + '"';
            document.getElementById('label-a').textContent = 'Answer ' + ansA.label;
            document.getElementById('answer-a').textContent = ansA.answer_text;
            document.getElementById('label-b').textContent = 'Answer ' + ansB.label;
            document.getElementById('answer-b').textContent = ansB.answer_text;
            document.getElementById('btn-a').onclick = () => castVote(ansA.label);
            document.getElementById('btn-b').onclick = () => castVote(ansB.label);

            return;
          }
        }
      }

      // No remaining matches across all questions
      questionEl.style.display = 'none';
      comparisonEl.style.display = 'none';
      status.textContent = 'Great job! You have reviewed all available questions.';
      status.style.color = '#2e7d32';
      status.style.display = 'block';
    }

    async function castVote(winnerLabel) {
      if (!currentMatch) return;

      const { error } = await supabase
        .from('preference_votes')
        .insert([{
          external_qid: currentMatch.question.external_qid,
          voter_id: voterId,
          round_number: currentMatch.round,
          match_in_round: currentMatch.match,
          answer_a_label: currentMatch.optionA.label,
          answer_b_label: currentMatch.optionB.label,
          winner_label: winnerLabel
        }]);

      const status = document.getElementById('status');

      if (error) {
        console.error(error);
        status.textContent = 'Error saving vote. Please try again.';
        status.style.color = '#c62828';
        status.style.display = 'block';
      } else {
        status.textContent = 'Vote saved! Loading next comparison...';
        status.style.color = '#2e7d32';
        status.style.display = 'block';
        setTimeout(loadNextPair, 800);
      }
    }

    loadNextPair();
  </script>
</body>
</html>
