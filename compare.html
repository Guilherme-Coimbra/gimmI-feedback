<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Answers — GimmI Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="nav"><a href="index.html">← Back to home</a></nav>

    <h1 class="page-title">Compare Answers</h1>
    <p class="page-subtitle">Read both responses and click the one you prefer.</p>

    <div class="question-display" id="question-display">Loading question...</div>

    <div class="comparison" id="comparison">
      <div class="answer-card">
        <h3>Answer A</h3>
        <p id="answer-a">Loading...</p>
        <button class="btn" onclick="window.vote('A')">I prefer this answer</button>
      </div>

      <div class="answer-card">
        <h3>Answer B</h3>
        <p id="answer-b">Loading...</p>
        <button class="btn" onclick="window.vote('B')">I prefer this answer</button>
      </div>
    </div>

    <p id="status" style="margin-top: 1.5rem; display: none;"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://hqbgbqhajargsgvyryrk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxYmdicWhhamFyZ3NndnlyeXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAxMzQsImV4cCI6MjEwMDIxNjEzNH0.7F42Rtp2OiEEZKBN2XJXJhCOCX9WmIUlUVBxv9qkT5s';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const voterId = localStorage.getItem('voter_id');
    if (!voterId) {
      window.location.href = 'index.html';
    }

    let currentQuestion = null;

    async function loadNextQuestion() {
      const status = document.getElementById('status');
      const questionEl = document.getElementById('question-display');
      const comparisonEl = document.getElementById('comparison');

      const { data: questions, error: qError } = await supabase
        .from('questions')
        .select('*');

      if (qError) {
        console.error(qError);
        status.textContent = 'Error loading questions. Please refresh.';
        status.style.color = '#c62828';
        status.style.display = 'block';
        return;
      }

      if (!questions || questions.length === 0) {
        questionEl.style.display = 'none';
        comparisonEl.style.display = 'none';
        status.textContent = 'No questions available yet. Check back later!';
        status.style.color = 'var(--muted-color)';
        status.style.display = 'block';
        return;
      }

      const { data: votes, error: vError } = await supabase
        .from('votes')
        .select('external_qid')
        .eq('voter_id', voterId);

      if (vError) {
        console.error(vError);
      }

      const votedQids = new Set((votes || []).map(v => v.external_qid));
      const remaining = questions.filter(q => !votedQids.has(q.external_qid));

      if (remaining.length === 0) {
        questionEl.style.display = 'none';
        comparisonEl.style.display = 'none';
        status.textContent = 'Great job! You have reviewed all available questions.';
        status.style.color = '#2e7d32';
        status.style.display = 'block';
        return;
      }

      currentQuestion = remaining[0];
      questionEl.textContent = '"' + currentQuestion.question_text + '"';
      document.getElementById('answer-a').textContent = currentQuestion.answer_a;
      document.getElementById('answer-b').textContent = currentQuestion.answer_b;

      questionEl.style.display = 'block';
      comparisonEl.style.display = 'flex';
      status.style.display = 'none';
    }

    window.vote = async function(choice) {
      if (!currentQuestion) return;

      const { error } = await supabase
        .from('votes')
        .insert([{
          external_qid: currentQuestion.external_qid,
          voter_id: voterId,
          choice: choice
        }]);

      if (error) {
        console.error(error);
        const status = document.getElementById('status');
        status.textContent = 'Error saving vote. Please try again.';
        status.style.color = '#c62828';
        status.style.display = 'block';
      } else {
        const status = document.getElementById('status');
        status.textContent = 'Vote saved! Loading next question...';
        status.style.color = '#2e7d32';
        status.style.display = 'block';
        setTimeout(loadNextQuestion, 800);
      }
    };

    loadNextQuestion();
  </script>
</body>
</html>
