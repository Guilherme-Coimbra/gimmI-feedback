<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit a Question — GimmI Feedback</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>
<body>
  <div class="container">
    <nav class="nav"><a href="index.html">← Back to home</a></nav>

    <h1 class="page-title">Submit a Question</h1>
    <p class="page-subtitle">Suggest a question and tell us what a good answer should cover.</p>

    <form id="submit-form">
      <div class="form-group">
        <label for="question">Your question</label>
        <textarea id="question" name="question" placeholder="e.g. What is the role of protein X in pathway Y?" required></textarea>
      </div>

      <div class="form-group">
        <label for="aspects">What should the answer cover? <span style="font-weight: normal; color: var(--muted-color);">(optional)</span></label>
        <textarea id="aspects" name="aspects" placeholder="e.g. Mention knockout studies, binding partners, and tissue specificity."></textarea>
      </div>

      <div class="form-group">
        <label for="length">Preferred answer length</label>
        <select id="length" name="length">
          <option value="short">Short (1–2 sentences)</option>
          <option value="long">Long (detailed explanation)</option>
        </select>
      </div>

      <button type="submit" class="btn">Submit question</button>
    </form>

    <p id="status" style="margin-top: 1rem; display: none;"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://hqbgbqhajargsgvyryrk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxYmdicWhhamFyZ3NndnlyeXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAxMzQsImV4cCI6MjEwMDIxNjEzNH0.7F42Rtp2OiEEZKBN2XJXJhCOCX9WmIUlUVBxv9qkT5s';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('submit-form');
    const status = document.getElementById('status');

    const voterId = localStorage.getItem('voter_id');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      const question = document.getElementById('question').value;
      const aspects = document.getElementById('aspects').value;
      const length = document.getElementById('length').value;

      const { error } = await supabase
        .from('submissions')
        .insert([{
          voter_id: voterId,
          question_text: question,
          answer_aspects: aspects,
          preferred_length: length
        }]);

      if (error) {
        console.error(error);
        status.textContent = 'Something went wrong. Please try again.';
        status.style.color = 'var(--danger-color)';
        status.style.display = 'block';
      } else {
        status.textContent = 'Thanks! Your question has been saved.';
        status.style.color = 'var(--ok-color)';
        status.style.display = 'block';
        form.reset();
      }
    });
  </script>
</body>
</html>
