<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GimmI Feedback</title>
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>
</head>
<body class="home">
  <div class="card">
    <h1>GimmI Feedback</h1>
    <p>Help us improve our AI system for bio research.</p>

    <div id="voter-section"></div>

    <div class="actions" id="actions" style="display: none;">
      <a href="compare.html" class="btn">Compare answers for feedback</a>
      <a href="grade.html" class="btn">Grade answers for feedback</a>
      <a href="validate.html" class="btn">Validate generated questions <span class="badge-new">(NEW)</span></a>
      <a href="submit.html" class="btn btn-contribute">Submit a question for future feedback</a>
      <a href="dashboard.html" class="btn btn-view">View feedback dashboard</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://hqbgbqhajargsgvyryrk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxYmdicWhhamFyZ3NndnlyeXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAxMzQsImV4cCI6MjEwMDIxNjEzNH0.7F42Rtp2OiEEZKBN2XJXJhCOCX9WmIUlUVBxv9qkT5s';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const voterSection = document.getElementById('voter-section');
    const actions = document.getElementById('actions');

    // Everyone picks their own reviewer ID. People whose answers are already in
    // the database (from the Google Form, stored under forms_respondent_N) get a
    // one-time claim link; the ID they choose there is recorded as an alias for
    // their existing one, so typing it on any device later finds their work and
    // they are never tied to the link. This page is the only place an ID is
    // entered, so it is the only place that has to resolve aliases.
    const claimId = new URLSearchParams(location.search).get('claim');
    if (claimId) history.replaceState(null, '', location.pathname);

    const storedId = localStorage.getItem('voter_id');

    function signIn(canonicalId, label) {
      localStorage.setItem('voter_id', canonicalId);
      localStorage.setItem('voter_label', label);
      location.reload();
    }

    function showIdForm(intro, onSubmit) {
      voterSection.innerHTML = `
        <form id="voter-form" style="margin-bottom: 1.5rem;">
          <div class="form-group">
            <label for="voter-id">${intro}</label>
            <p style="font-size: 0.85rem; color: var(--muted-color); margin-bottom: 0.6rem; line-height: 1.4;">
              Choose any ID you like, but use the same one every time.<br>
              Tip: first initials + birthdate (e.g. <strong>gc01052003</strong>)
            </p>
            <input type="text" id="voter-id" placeholder="e.g. gc01052003" required>
            <p id="voter-error" style="font-size: 0.85rem; color: var(--danger-color); margin-top: 0.5rem; display: none;"></p>
          </div>
          <button type="submit" class="btn">Continue</button>
        </form>`;

      const form = document.getElementById('voter-form');
      const errorEl = document.getElementById('voter-error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('voter-id').value.trim();
        if (!id) return;
        errorEl.style.display = 'none';
        form.querySelector('button').disabled = true;
        await onSubmit(id, message => {
          errorEl.textContent = message;
          errorEl.style.display = 'block';
          form.querySelector('button').disabled = false;
        });
      });
    }

    // Resolve a typed ID through the alias table before using it.
    async function signInWithTypedId(id, fail) {
      const { data, error } = await supabase
        .from('reviewer_aliases')
        .select('canonical_id')
        .eq('alias_id', id)
        .maybeSingle();

      if (error) {
        fail('Could not reach the server. Please try again.');
        return;
      }
      signIn(data ? data.canonical_id : id, id);
    }

    async function startClaim(canonicalId) {
      const { data: alreadyClaimed, error } = await supabase
        .from('reviewer_aliases')
        .select('alias_id')
        .eq('canonical_id', canonicalId)
        .maybeSingle();

      if (error) {
        showIdForm('Enter your reviewer ID', signInWithTypedId);
        return;
      }

      if (alreadyClaimed) {
        showIdForm('This link has already been used — enter the reviewer ID you chose', signInWithTypedId);
        return;
      }

      showIdForm(
        'Welcome back! Your earlier answers are already saved — choose the reviewer ID you will use from now on',
        async (id, fail) => {
          const { error: claimError } = await supabase
            .from('reviewer_aliases')
            .insert([{ alias_id: id, canonical_id: canonicalId }]);

          if (claimError) {
            fail('That ID is already taken. Please choose a different one.');
            return;
          }
          signIn(canonicalId, id);
        }
      );
    }

    if (storedId) {
      const label = localStorage.getItem('voter_label') || storedId;
      voterSection.innerHTML = `
        <p style="color: var(--muted-color); font-size: 0.9rem; margin-bottom: 1.5rem;">
          Reviewer ID: <strong></strong>
          <a href="#" id="change-id" style="color: var(--accent-color); margin-left: 0.5rem;">(change)</a>
        </p>`;
      voterSection.querySelector('strong').textContent = label;
      actions.style.display = 'flex';
      document.getElementById('change-id').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('voter_id');
        localStorage.removeItem('voter_label');
        location.reload();
      });
    } else if (claimId) {
      await startClaim(claimId);
    } else {
      showIdForm('Enter your reviewer ID', signInWithTypedId);
    }
  </script>
</body>
</html>
